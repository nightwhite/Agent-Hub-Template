apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  labels:
    app: hermes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      containers:
        - name: hermes
          image: agent-hub/hermes:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_PORT
              value: "8642"
            - name: API_SERVER_KEY
              value: "change-me-local-dev"
          args: ["gateway"]
          workingDir: /workspace
