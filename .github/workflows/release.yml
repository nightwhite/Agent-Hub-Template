name: release-enabled-agents

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to publish
        required: true
        type: string
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      count: ${{ steps.matrix.outputs.count }}
      image_tag: ${{ steps.tag.outputs.image_tag }}
      owner: ${{ steps.owner.outputs.owner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate agent contracts
        run: bash test/validate-agent-contract.sh

      - name: Resolve owner
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Resolve image tag
        id: tag
        env:
          INPUT_IMAGE_TAG: ${{ github.event.inputs.image_tag || '' }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          if [[ -n "$INPUT_IMAGE_TAG" ]]; then
            echo "image_tag=$INPUT_IMAGE_TAG" >> "$GITHUB_OUTPUT"
          elif [[ "$REF_TYPE" == "tag" ]]; then
            echo "image_tag=${REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate agent matrix from registry
        id: matrix
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          registry_path = Path("registry/agents.yaml")
          items = []
          current = None

          for raw_line in registry_path.read_text().splitlines():
              line = raw_line.strip()
              if not line or line.startswith("#") or line == "agents:":
                  continue
              if line.startswith("- "):
                  if current:
                      items.append(current)
                  current = {}
                  line = line[2:]
              if ":" not in line:
                  continue
              key, value = line.split(":", 1)
              key = key.strip()
              value = value.strip()
              if value.lower() == "true":
                  parsed = True
              elif value.lower() == "false":
                  parsed = False
              else:
                  parsed = value.strip("\"'")
              current[key] = parsed

          if current:
              items.append(current)

          enabled = [
              {
                  "name": item["name"],
                  "path": item["path"],
              }
              for item in items
              if item.get("enabled") is True
          ]

          print(f"matrix={json.dumps({'include': enabled}, separators=(',', ':'))}")
          print(f"count={len(enabled)}")
          PY

  release:
    needs: prepare
    if: needs.prepare.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build release image
        run: |
          docker build \
            --file "${{ matrix.path }}/Dockerfile" \
            --tag "ghcr.io/${{ needs.prepare.outputs.owner }}/${{ matrix.name }}:${{ needs.prepare.outputs.image_tag }}" \
            .

      - name: Push image
        run: |
          docker push "ghcr.io/${{ needs.prepare.outputs.owner }}/${{ matrix.name }}:${{ needs.prepare.outputs.image_tag }}"
